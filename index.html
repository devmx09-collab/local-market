<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unit</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Unit</div>
    <button class="post-btn">Post</button>
  </header>

  <main class="container">
    <section class="hero">
      <p class="eyebrow">Local marketplace</p>
      <h1>Real local stuff. No nonsense.</h1>
      <p class="sub">Buy, sell, and find services in your area.</p>
      <div class="search-row">
        <input type="text" placeholder="Search listings..." />
        <button>Search</button>
      </div>
    </section>

    <section class="section">
      <h2>Browse by category</h2>
      <div class="categories">
        <button>For Sale</button>
        <button>Free</button>
        <button>Services</button>
        <button>Housing</button>
        <button>Jobs</button>
        <button>Vehicles</button>
        <button>Electronics</button>
        <button>Furniture</button>
      </div>
    </section>

    <section class="section">
      <h2>Newest nearby</h2>
      <div class="listings">
        <article class="card">
          <div class="image"></div>
          <div class="card-row">
            <div><h3>Used iPhone 13</h3><p>Downtown</p></div>
            <strong>$320</strong>
          </div>
        </article>
        <article class="card">
          <div class="image"></div>
          <div class="card-row">
            <div><h3>Wood desk</h3><p>North Side</p></div>
            <strong>$45</strong>
          </div>
        </article>
        <article class="card">
          <div class="image"></div>
          <div class="card-row">
            <div><h3>Yard cleanup service</h3><p>West End</p></div>
            <strong>$80</strong>
          </div>
        </article>
        <article class="card">
          <div class="image"></div>
          <div class="card-row">
            <div><h3>Free box of books</h3><p>East Side</p></div>
            <strong>Free</strong>
          </div>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
