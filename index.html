<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Local Mrkt</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Local Mrkt</div>
    <button class="post-btn" type="button">Post</button>
  </header>

  <main class="container">
    <section class="hero">
      <p class="eyebrow">Local marketplace</p>
      <h1>Real local stuff. No nonsense.</h1>
      <p class="sub">Buy, sell, and find services in your area.</p>
      <div class="search-row">
        <input type="text" placeholder="Search listings..." />
        <button type="button">Search</button>
      </div>
    </section>

    <form id="postForm" class="post-form hidden">
      <input name="title" placeholder="Title" />
      <input name="price" placeholder="Price" />
      <input name="area" placeholder="Area" />
      <input name="category" placeholder="Category" />
      <button type="submit">Add listing</button>
    </form>

    <section class="section">
      <h2>Browse by category</h2>
      <div class="categories">
        <button type="button">For Sale</button>
        <button type="button">Free</button>
        <button type="button">Services</button>
        <button type="button">Housing</button>
        <button type="button">Jobs</button>
        <button type="button">Vehicles</button>
        <button type="button">Electronics</button>
        <button type="button">Furniture</button>
      </div>
    </section>

    <section class="section">
      <h2>Newest nearby</h2>
      <div class="listings"></div>
    </section>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button id="closeModal" type="button">×</button>
      <h2 id="modalTitle"></h2>
      <p id="modalArea"></p>
      <strong id="modalPrice"></strong>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
